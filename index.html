<!DOCTYPE html>
<html>

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Birthday Surprise</title>
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
</head>

<body class="center">



    <!-- Birthday Question Section -->
    <div class="birthday-question" id="birthdayQuestion">
        <div class="card">
            <h1>Is today your birthday?</h1>
            <div class="button-group">
                <button onclick="handleYes()">Yes</button>
                <button onclick="handleNo()">No</button>
            </div>
        </div>
    </div>

    <!-- Gift Box Section (shown when Yes) -->
    <div class="gift-box" id="giftBox" style="display: none;">
        <div class="card">
            <h1>I made something special for you 🤗 </h1>
            <button onclick="openSurprise()">Open </button>
        </div>
    </div>

    <!-- No Birthday Section (shown when No) -->
    <div class="no-birthday" id="noBirthday" style="display: none;">
        <div class="card">
            <h1>You don't have anything special 🥱</h1>
            <button onclick="goBackToBirthday()">Back</button>
        </div>
    </div>

    <script src="js/script.js"></script>
</body>

</html>
