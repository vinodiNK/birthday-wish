<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Birthday Surprise</title>

    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet">

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Poppins', sans-serif;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background: linear-gradient(135deg, #dcecff, #c7e0ff, #eaf4ff);
            overflow-x: hidden;
            padding: 16px;
        }
        /* Background circles */
        
        .circle {
            position: absolute;
            border-radius: 50%;
            opacity: 0.25;
            animation: float 6s infinite ease-in-out;
        }
        
        .circle1 {
            width: 120px;
            height: 120px;
            background: #8ec5ff;
            top: 5%;
            left: 5%;
        }
        
        .circle2 {
            width: 80px;
            height: 80px;
            background: #ffd6e7;
            bottom: 8%;
            right: 8%;
            animation-delay: 1s;
        }
        
        .circle3 {
            width: 60px;
            height: 60px;
            background: #fff3a3;
            top: 10%;
            right: 15%;
            animation-delay: 2s;
        }
        
        .circle4 {
            width: 100px;
            height: 100px;
            background: #b8f7d4;
            bottom: 12%;
            left: 10%;
            animation-delay: 3s;
        }
        
        @keyframes float {
            0%,
            100% {
                transform: translateY(0px);
            }
            50% {
                transform: translateY(-18px);
            }
        }
        /* Confetti */
        
        .confetti {
            position: absolute;
            width: 10px;
            height: 10px;
            top: -20px;
            border-radius: 2px;
            animation: fall linear infinite;
        }
        
        .confetti:nth-child(1) {
            left: 10%;
            background: #ff7eb3;
            animation-duration: 6s;
        }
        
        .confetti:nth-child(2) {
            left: 25%;
            background: #7afcff;
            animation-duration: 8s;
        }
        
        .confetti:nth-child(3) {
            left: 40%;
            background: #fff3a3;
            animation-duration: 5s;
        }
        
        .confetti:nth-child(4) {
            left: 60%;
            background: #ffffff;
            animation-duration: 7s;
        }
        
        .confetti:nth-child(5) {
            left: 80%;
            background: #cdb4ff;
            animation-duration: 6s;
        }
        
        @keyframes fall {
            0% {
                transform: translateY(-20px) rotate(0deg);
            }
            100% {
                transform: translateY(110vh) rotate(360deg);
            }
        }
        /* Card */
        
        .card {
            width: min(92%, 650px);
            background: rgba(255, 255, 255, 0.3);
            backdrop-filter: blur(15px);
            border-radius: 24px;
            padding: clamp(20px, 5vw, 50px);
            text-align: center;
            position: relative;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.08), 0 2px 8px rgba(0, 0, 0, 0.05);
            animation: popup 0.7s ease;
        }
        
        @keyframes popup {
            from {
                opacity: 0;
                transform: scale(0.8);
            }
            to {
                opacity: 1;
                transform: scale(1);
            }
        }
        
        h1 {
            font-size: clamp(1.6rem, 4vw, 2.8rem);
            font-weight: 600;
            color: #16356d;
            line-height: 1.3;
            margin-bottom: 25px;
        }
        
        .highlight {
            color: #2979ff;
        }
        /* Images */
        
        img {
            max-width: 100%;
            height: auto;
        }
        
        .balloon {
            width: clamp(50px, 12vw, 90px);
            position: absolute;
            animation: float 4s infinite ease-in-out;
        }
        
        .balloon-left {
            left: -10px;
            top: 20px;
        }
        
        .balloon-right {
            right: -10px;
            top: 20px;
            animation-delay: 1s;
        }
        
        .gift-image {
            width: clamp(80px, 18vw, 130px);
            margin-bottom: 20px;
            animation: shake 2s infinite;
        }
        
        @keyframes shake {
            0%,
            100% {
                transform: rotate(0deg);
            }
            25% {
                transform: rotate(5deg);
            }
            75% {
                transform: rotate(-5deg);
            }
        }
        /* Buttons (Material style) */
        
        .button-group {
            display: flex;
            justify-content: center;
            gap: 12px;
            flex-wrap: wrap;
            margin-top: 10px;
        }
        
        button {
            padding: 14px 24px;
            border: none;
            border-radius: 14px;
            background: linear-gradient(135deg, #4fa2ff, #0066ff);
            color: white;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            min-width: 140px;
            transition: 0.3s ease;
            box-shadow: 0 10px 20px rgba(0, 102, 255, 0.2);
        }
        
        button:hover {
            transform: translateY(-3px);
        }
        /* Mobile */
        
        @media (max-width: 480px) {
            .button-group {
                flex-direction: column;
            }
            button {
                width: 100%;
            }
        }
        
        .hidden {
            display: none;
        }
    </style>
</head>

<body>

    <!-- Background -->
    <div class="circle circle1"></div>
    <div class="circle circle2"></div>
    <div class="circle circle3"></div>
    <div class="circle circle4"></div>

    <!-- Confetti -->
    <div class="confetti"></div>
    <div class="confetti"></div>
    <div class="confetti"></div>
    <div class="confetti"></div>
    <div class="confetti"></div>

    <!-- QUESTION -->
    <div id="birthdayQuestion">
        <div class="card">

            <img src="assets/balloon.png" class="balloon balloon-left">
            <img src="assets/balloon.png" class="balloon balloon-right">

            <h1>
                Is Today <br>
                <span class="highlight">Your Birthday?</span>
            </h1>

            <div class="button-group">
                <button onclick="handleYes()">Yes 🎂</button>
                <button onclick="handleNo()">No 😴</button>
            </div>

        </div>
    </div>

    <!-- GIFT -->
    <div id="giftBox" class="hidden">
        <div class="card">

            <img src="assets/gift.png" class="gift-image">

            <h1>
                I made something <br>
                <span class="highlight">special for you</span>
            </h1>

            <button onclick="openSurprise()">Open ✨</button>

        </div>
    </div>

    <!-- NO -->
    <div id="noBirthday" class="hidden">
        <div class="card">
            <h1>There’s no surprise for you today 🙃</h1>
            <button onclick="goBackToBirthday()">Back</button>
        </div>
    </div>

    <script>
        function handleYes() {
            document.getElementById("birthdayQuestion").classList.add("hidden");
            document.getElementById("giftBox").classList.remove("hidden");
        }

        function handleNo() {
            document.getElementById("birthdayQuestion").classList.add("hidden");
            document.getElementById("noBirthday").classList.remove("hidden");
        }

        function goBackToBirthday() {
            document.getElementById("noBirthday").classList.add("hidden");
            document.getElementById("birthdayQuestion").classList.remove("hidden");
        }

        function openSurprise() {
            window.location.href = "video.html";
        }
    </script>

</body>

</html>
