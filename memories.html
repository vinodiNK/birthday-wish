<!DOCTYPE html>
<html>

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Memories</title>
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
</head>

<body>

    <h1 class="center">Your Memories </h1>


    <!-- Memory Video -->
    <div class="center">
        <video id="memoriesVideo" width="500" controls>
            <source src="assets/videos/memories.mp4" type="video/mp4">
        </video>
    </div>





    <script>
        function shouldAutoplay() {
            return new URLSearchParams(window.location.search).get('autoplay') === 'true';
        }

        function goMessage() {
            window.location.href = 'message.html';
        }

        window.addEventListener('DOMContentLoaded', () => {
            const video = document.getElementById('memoriesVideo');
            if (video && shouldAutoplay()) {
                video.play().catch(() => {
                    // Autoplay may be blocked; keep controls visible for manual play.
                });
            }
            if (video) {
                video.addEventListener('ended', () => {
                    window.location.href = 'message.html';
                });
            }
        });
    </script>

</body>

</html>
