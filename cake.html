<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Birthday Cake</title>

    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet">

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Poppins', sans-serif;
            min-height: 100vh;
            overflow-y: auto;
            overflow-x: hidden;
            display: flex;
            justify-content: center;
            align-items: center;
            background: linear-gradient(135deg, #dcecff, #c7e0ff, #eaf4ff);
        }
        /* Floating circles */
        
        .circle {
            position: absolute;
            border-radius: 50%;
            opacity: 0.3;
            animation: float 6s infinite ease-in-out;
        }
        
        .circle1 {
            width: 120px;
            height: 120px;
            background: #8ec5ff;
            top: 8%;
            left: 8%;
        }
        
        .circle2 {
            width: 80px;
            height: 80px;
            background: #ffd6e7;
            bottom: 10%;
            right: 10%;
            animation-delay: 1s;
        }
        
        .circle3 {
            width: 60px;
            height: 60px;
            background: #fff3a3;
            top: 12%;
            right: 18%;
            animation-delay: 2s;
        }
        
        .circle4 {
            width: 100px;
            height: 100px;
            background: #b8f7d4;
            bottom: 15%;
            left: 12%;
            animation-delay: 3s;
        }
        
        @keyframes float {
            0%,
            100% {
                transform: translateY(0px);
            }
            50% {
                transform: translateY(-18px);
            }
        }
        /* POPUP */
        
        .popup {
            width: 90%;
            max-width: 760px;
            background: rgba(255, 255, 255, 0.15);
            backdrop-filter: blur(18px);
            border-radius: 35px;
            padding: 50px 40px;
            text-align: center;
            box-shadow: 0 15px 40px rgba(0, 0, 0, 0.2);
        }
        
        .cake-icon {
            width: 120px;
            margin-bottom: 15px;
            animation: float 3s ease-in-out infinite;
        }
        
        h1 {
            color: rgb(82, 101, 224);
            font-size: 3rem;
            margin-bottom: 35px;
            line-height: 1.2;
        }
        
        .highlight {
            background: linear-gradient(90deg, #6aa8ff, #ff5ecf);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        /* BUTTONS */
        
        .button-group {
            display: flex;
            justify-content: center;
            gap: 25px;
            flex-wrap: wrap;
        }
        
        button {
            border: none;
            padding: 16px 45px;
            border-radius: 60px;
            font-size: 1.2rem;
            font-weight: 600;
            cursor: pointer;
            color: white;
            transition: 0.3s;
        }
        
        .yes-btn {
            background: linear-gradient(135deg, #3366ff, #7b4dff);
        }
        
        .no-btn {
            background: linear-gradient(135deg, #ff5ea8, #ff2d7a);
        }
        
        button:hover {
            transform: translateY(-5px) scale(1.05);
        }
        /* CAKE SECTION */
        
        .cake-section {
            display: none;
            flex-direction: column;
            align-items: center;
            text-align: center;
        }
        
        .cake-img {
            max-width: 320px;
            width: 100%;
            margin-top: 25px;
            border-radius: 25px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.3);
        }
        
        .cake-message {
            color: #111;
            font-size: 2rem;
            margin-top: 20px;
            font-weight: 600;
        }
        /* MEMORIES BUTTON */
        
        .memory-btn {
            margin-top: 25px;
            padding: 14px 40px;
            border: none;
            border-radius: 50px;
            background: linear-gradient(135deg, #00c6ff, #0072ff);
            color: white;
            font-size: 1.1rem;
            font-weight: 600;
            cursor: pointer;
            transition: 0.3s;
        }
        
        .memory-btn:hover {
            transform: scale(1.08);
        }
        /* NO CAKE SCREEN */
        
        .no-cake-screen {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.5);
            backdrop-filter: blur(10px);
            display: none;
            justify-content: center;
            align-items: center;
            z-index: 9999;
        }
        /* CARD */
        
        .no-card {
            background: linear-gradient(135deg, #6a5acd, #8a7fff);
            padding: 40px 30px;
            border-radius: 25px;
            text-align: center;
            width: 90%;
            max-width: 420px;
            box-shadow: 0 20px 50px rgba(0, 0, 0, 0.4);
            animation: popIn 0.5s ease;
        }
        
        .no-card h1 {
            font-size: 1.8rem;
            color: white;
            margin-bottom: 15px;
        }
        
        .no-card button {
            padding: 12px 35px;
            border: none;
            border-radius: 50px;
            background: white;
            color: #6a5acd;
            font-weight: bold;
            cursor: pointer;
        }
        
        .no-card button:hover {
            transform: scale(1.1);
        }
        
        @keyframes popIn {
            from {
                transform: scale(0.6);
                opacity: 0;
            }
            to {
                transform: scale(1);
                opacity: 1;
            }
        }
        /* MOBILE */
        
        @media (max-width: 768px) {
            h1 {
                font-size: 2rem;
            }
            .cake-img {
                width: 90%;
            }
            button {
                width: 100%;
            }
        }
    </style>
</head>

<body>

    <!-- BACKGROUND -->
    <div class="circle circle1"></div>
    <div class="circle circle2"></div>
    <div class="circle circle3"></div>
    <div class="circle circle4"></div>

    <!-- QUESTION -->
    <div class="popup" id="questionBox">

        <img src="assets/cake.png" class="cake-icon">

        <h1>
            Do you want to see <br> your <span class="highlight">birthday cake?</span>
        </h1>

        <div class="button-group">
            <button class="yes-btn" onclick="goCake()">😇 Yes</button>
            <button class="no-btn" onclick="noCake()">😜 No</button>
        </div>

    </div>

    <!-- CAKE -->
    <div class="cake-section" id="cakeSection">

        <p class="cake-message">This cake is specially for you! 🎂</p>

        <img src="assets/images/cake.jpg" class="cake-img">

        <!-- MEMORIES BUTTON -->
        <button class="memory-btn" onclick="nextMemories()">
            See Memories 🤩
        </button>

    </div>

    <!-- NO CAKE SCREEN -->
    <div class="no-cake-screen" id="noCakeScreen">
        <div class="no-card">
            <h1>😜 You have no cake today!</h1>
            <button onclick="closeNoCake()">Go Back</button>
        </div>
    </div>

    <script>
        function goCake() {
            document.getElementById("questionBox").style.display = "none";
            document.getElementById("cakeSection").style.display = "flex";
        }

        function noCake() {
            document.getElementById("noCakeScreen").style.display = "flex";
        }

        function closeNoCake() {
            document.getElementById("noCakeScreen").style.display = "none";
        }

        function nextMemories() {
            window.location.href = "memories.html";
        }
    </script>

</body>

</html>
