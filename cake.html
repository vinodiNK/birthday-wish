<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Birthday Cake</title>

    <!-- Google Font -->
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet">

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Poppins', sans-serif;
            height: 100vh;
            overflow: hidden;
            display: flex;
            justify-content: center;
            align-items: center;
            background: linear-gradient(135deg, #dcecff, #c7e0ff, #eaf4ff);
            position: relative;
        }
        /* Floating background circles */
        
        .circle {
            position: absolute;
            border-radius: 50%;
            opacity: 0.35;
            animation: float 6s infinite ease-in-out;
        }
        
        .circle1 {
            width: 120px;
            height: 120px;
            background: #8ec5ff;
            top: 8%;
            left: 8%;
        }
        
        .circle2 {
            width: 80px;
            height: 80px;
            background: #ffd6e7;
            bottom: 10%;
            right: 10%;
            animation-delay: 1s;
        }
        
        .circle3 {
            width: 60px;
            height: 60px;
            background: #fff3a3;
            top: 12%;
            right: 18%;
            animation-delay: 2s;
        }
        
        .circle4 {
            width: 100px;
            height: 100px;
            background: #b8f7d4;
            bottom: 15%;
            left: 12%;
            animation-delay: 3s;
        }
        
        @keyframes float {
            0%,
            100% {
                transform: translateY(0px);
            }
            50% {
                transform: translateY(-18px);
            }
        }
        /* Background Glow */
        
        .bg-glow {
            position: absolute;
            width: 700px;
            height: 700px;
            background: rgba(128, 0, 255, 0.18);
            border-radius: 50%;
            filter: blur(100px);
            z-index: 0;
        }
        /* Floating Confetti */
        
        .confetti {
            position: absolute;
            width: 12px;
            height: 12px;
            border-radius: 3px;
            animation: fall linear infinite;
        }
        
        .confetti:nth-child(1) {
            left: 10%;
            background: #ff4ecd;
            animation-duration: 6s;
        }
        
        .confetti:nth-child(2) {
            left: 30%;
            background: #00e5ff;
            animation-duration: 8s;
        }
        
        .confetti:nth-child(3) {
            left: 50%;
            background: #ffd54f;
            animation-duration: 7s;
        }
        
        .confetti:nth-child(4) {
            left: 70%;
            background: #ffffff;
            animation-duration: 5s;
        }
        
        .confetti:nth-child(5) {
            left: 85%;
            background: #b388ff;
            animation-duration: 9s;
        }
        
        @keyframes fall {
            0% {
                transform: translateY(-20px) rotate(0deg);
            }
            100% {
                transform: translateY(110vh) rotate(360deg);
            }
        }
        /* Balloons */
        
        .balloon {
            position: absolute;
            width: 110px;
            animation: float 4s infinite ease-in-out;
        }
        
        .left-balloon {
            left: 8%;
            bottom: 15%;
        }
        
        .right-balloon {
            right: 8%;
            bottom: 15%;
            animation-delay: 1s;
        }
        
        @keyframes float {
            0%,
            100% {
                transform: translateY(0px);
            }
            50% {
                transform: translateY(-20px);
            }
        }
        /* Popup Card */
        
        .popup {
            width: 90%;
            max-width: 760px;
            background: rgba(255, 255, 255, 0.12);
            backdrop-filter: blur(18px);
            border-radius: 35px;
            padding: 50px 40px;
            text-align: center;
            position: relative;
            z-index: 2;
            box-shadow: 0 15px 40px rgba(0, 0, 0, 0.35);
            border: 1px solid rgba(255, 255, 255, 0.15);
            animation: popup 0.8s ease;
        }
        
        @keyframes popup {
            from {
                opacity: 0;
                transform: scale(0.7);
            }
            to {
                opacity: 1;
                transform: scale(1);
            }
        }
        /* Cake */
        
        .cake-icon {
            width: 160px;
            margin-top: -130px;
            margin-bottom: 20px;
            animation: cakeFloat 3s infinite ease-in-out;
            filter: drop-shadow(0 0 25px rgba(255, 255, 255, 0.4));
        }
        
        @keyframes cakeFloat {
            0%,
            100% {
                transform: translateY(0px);
            }
            50% {
                transform: translateY(-12px);
            }
        }
        
        h1 {
            color: white;
            font-size: 3rem;
            line-height: 1.4;
            margin-bottom: 35px;
            font-weight: 700;
        }
        
        .highlight {
            background: linear-gradient(90deg, #6aa8ff, #ff5ecf);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        /* Buttons */
        
        .button-group {
            display: flex;
            justify-content: center;
            gap: 25px;
            flex-wrap: wrap;
        }
        
        button {
            border: none;
            padding: 18px 50px;
            border-radius: 60px;
            font-size: 1.3rem;
            font-weight: 600;
            cursor: pointer;
            transition: 0.3s;
            color: white;
            min-width: 220px;
        }
        
        .yes-btn {
            background: linear-gradient(135deg, #3366ff, #7b4dff);
            box-shadow: 0 10px 25px rgba(51, 102, 255, 0.35);
        }
        
        .no-btn {
            background: linear-gradient(135deg, #ff5ea8, #ff2d7a);
            box-shadow: 0 10px 25px rgba(255, 45, 122, 0.35);
        }
        
        button:hover {
            transform: translateY(-5px) scale(1.05);
        }
        /* Cake Section */
        
        .cake-section {
            display: none;
            flex-direction: column;
            align-items: center;
            text-align: center;
            z-index: 2;
            position: relative;
        }
        
        .cake-img {
            width: 320px;
            border-radius: 25px;
            margin-top: 25px;
            box-shadow: 0 10px 35px rgba(0, 0, 0, 0.4);
            animation: zoom 1s ease;
        }
        
        @keyframes zoom {
            from {
                transform: scale(0.5);
                opacity: 0;
            }
            to {
                transform: scale(1);
                opacity: 1;
            }
        }
        
        .cake-message {
            color: rgb(17, 16, 16);
            font-size: 2rem;
            margin-top: 20px;
            font-weight: 600;
        }
        
        .memory-btn {
            margin-top: 30px;
            background: linear-gradient(135deg, #00c6ff, #0072ff);
        }
        /* Mobile */
        
        @media(max-width:768px) {
            h1 {
                font-size: 2rem;
            }
            .cake-icon {
                width: 120px;
                margin-top: -90px;
            }
            .cake-img {
                width: 90%;
            }
            button {
                width: 100%;
                min-width: unset;
            }
            .popup {
                padding: 40px 25px;
            }
            .balloon {
                width: 70px;
            }
        }
    </style>
</head>

<body>

    <!-- Floating background circles -->
    <div class="circle circle1"></div>
    <div class="circle circle2"></div>
    <div class="circle circle3"></div>
    <div class="circle circle4"></div>

    <!-- Background Glow -->
    <div class="bg-glow"></div>

    <!-- Confetti -->
    <div class="confetti"></div>
    <div class="confetti"></div>
    <div class="confetti"></div>
    <div class="confetti"></div>
    <div class="confetti"></div>



    <!-- Question Popup -->

    <div class="popup" id="questionBox">

        <!-- Cake Icon -->
        <img src="assets/cake.png" class="cake-icon">

        <h1>
            Do you want to see <br> your <span class="highlight">birthday cake?</span>
        </h1>

        <div class="button-group">
            <button class="yes-btn" onclick="goCake()">
                😇 Yes
            </button>

            <button class="no-btn" onclick="noCake()">
                😜 No
            </button>
        </div>

    </div>

    <!-- Cake Section -->

    <div class="cake-section" id="cakeSection">

        <p id="cakeMessage" class="cake-message">
            This cake is specially for you!🎂
        </p>

        <img id="cakeImage" src="assets/images/cake.jpg" class="cake-img" alt="Birthday Cake">



        <button class="memory-btn" onclick="nextMemories()">
            See Memories 🤩
        </button>

    </div>

    <script>
        function goCake() {

            document.getElementById("questionBox").style.display = "none";

            document.getElementById("cakeSection").style.display = "flex";
        }

        function noCake() {

            alert("😜 Okay! No cake for you today.");
        }

        function nextMemories() {

            // Change page here

            window.location.href = "memories.html";
        }
    </script>

</body>

</html>
