<!DOCTYPE html>
<html>

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cake Time</title>
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
</head>

<body class="center">

    <div id="overlay" class="overlay">
        <div id="questionBox" class="popup" style="display: block;">
            <p>Do you want to see your birthday cake?</p>
            <div class="button-group">
                <button onclick="goCake()">Yes 😇</button>
                <button onclick="noCake()">No 😜</button>
            </div>
        </div>
    </div>

    <div class="cake-card">

        <div id="cakeSection" class="fade" style="display: none; width: 100%;">
            <p id="cakeMessage" class="cake-message"></p>
            <img id="cakeImage" src="assets/images/cake.jpg" class="cake-img" alt="Birthday Cake" style="display: none;">
            <p id="wishText" class="cake-message"></p>
            <button id="memoriesButton" onclick="nextMemories()">See Memories 🤩</button>
            <button id="backButton" onclick="goBack()" style="display: none;">Back ↩</button>
        </div>
    </div>

    <script src="js/script.js"></script>
</body>

</html>
